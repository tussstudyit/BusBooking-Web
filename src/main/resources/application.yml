server:
  port: ${ADMIN_WEB_PORT:8081}

spring:
  application:
    name: busbooking-web
  datasource:
    url: ${BUSBOOKING_DB_URL:jdbc:mysql://localhost:3306/busbooking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true}
    username: ${BUSBOOKING_DB_USERNAME:root}
    password: ${BUSBOOKING_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  thymeleaf:
    cache: false

admin:
  session-timeout-minutes: ${ADMIN_SESSION_TIMEOUT_MINUTES:120}

vnpay:
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  return-url: ${VNPAY_RETURN_URL:http://10.0.2.2:8081/api/payments/vnpay/return}
