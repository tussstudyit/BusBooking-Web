<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{user/fragments/layout :: shell(~{::section})}">
  <section>
    <div class="ticket-detail">
      <div>
        <p class="eyebrow" th:text="${'Mã vé #' + ticket.id}">Mã vé #1</p>
        <h1 th:text="${ticket.trip.routeLabel()}">Đà Nẵng -> Hà Nội</h1>
        <p class="muted" th:text="${ticket.trip.busName + ' · ' + ticket.trip.licensePlate}">Xe giường nằm · 43A-12345</p>
        <div class="info-grid">
          <div>
            <span>Hành khách</span>
            <strong th:text="${ticket.passengerName}">Người dùng</strong>
          </div>
          <div>
            <span>Số điện thoại</span>
            <strong th:text="${ticket.passengerPhone}">0900000000</strong>
          </div>
          <div>
            <span>Khởi hành</span>
            <strong th:text="${@userLabels.dateTime(ticket.trip.departureTime)}">01/06/26 07:00</strong>
          </div>
          <div>
            <span>Ghế</span>
            <strong th:text="${ticket.seat.seatNumber}">A01</strong>
          </div>
          <div>
            <span>Thanh toán</span>
            <strong th:text="${@userLabels.status(ticket.status)}">Đã thanh toán</strong>
          </div>
          <div>
            <span>Thời gian đặt</span>
            <strong th:text="${@userLabels.dateTime(ticket.bookingTime)}">01/06/26 07:00</strong>
          </div>
        </div>
        <div class="button-row">
          <a class="btn muted" th:href="@{/user/tickets}">Quay lại</a>
          <a class="btn" th:if="${!ticket.paid() and ticket.paymentId != null}" th:href="@{/user/payments/{id}(id=${ticket.paymentId})}">Thanh toán</a>
          <form th:if="${ticket.cancellable()}" th:action="@{/user/tickets/{id}/cancel(id=${ticket.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn danger" type="submit">Hủy vé</button>
          </form>
        </div>
      </div>
      <div class="qr-panel ticket-qr">
        <img th:if="${ticket.paid()}" th:src="${'data:' + ticket.qrMimeType + ';base64,' + ticket.qrImageBase64}" alt="QR vé">
        <p th:unless="${ticket.paid()}">QR vé chỉ hiển thị sau khi thanh toán thành công.</p>
      </div>
    </div>
  </section>
</div>
</body>
</html>
