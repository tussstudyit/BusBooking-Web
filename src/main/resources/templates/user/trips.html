<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{user/fragments/layout :: shell(~{::section})}">
  <section>
    <div class="page-head">
      <p class="eyebrow">Chuyến xe</p>
      <h1>Danh sách chuyến</h1>
    </div>

    <form class="search-panel slim" th:action="@{/user/trips}" method="get">
      <label>
        <span>Điểm đi</span>
        <select name="origin">
          <option value="">Tất cả</option>
          <option th:each="item : ${origins}" th:value="${item}" th:text="${item}" th:selected="${item == origin}">Đà Nẵng</option>
        </select>
      </label>
      <label>
        <span>Điểm đến</span>
        <select name="destination">
          <option value="">Tất cả</option>
          <option th:each="item : ${destinations}" th:value="${item}" th:text="${item}" th:selected="${item == destination}">Hà Nội</option>
        </select>
      </label>
      <label>
        <span>Ngày đi</span>
        <input id="tripDateIso" type="hidden" name="tripDate" th:value="${tripDate}">
        <input type="text" inputmode="numeric" placeholder="dd/MM/yy" th:value="${tripDateLabel}" data-date-input="tripDateIso">
      </label>
      <button class="btn" type="submit">Lọc</button>
    </form>

    <div class="trip-list">
      <article class="trip-card" th:each="trip : ${trips}">
        <div class="trip-route">
          <strong th:text="${trip.routeLabel()}">Đà Nẵng -> Hà Nội</strong>
          <p>
            <span th:text="${trip.busName}">Xe giường nằm</span>
            <span th:text="${' · ' + trip.licensePlate}"> · 43A-12345</span>
          </p>
        </div>
        <div class="trip-meta">
          <span>Khởi hành</span>
          <strong th:text="${@userLabels.dateTime(trip.departureTime)}">01/06/26 07:00</strong>
        </div>
        <div class="trip-meta">
          <span>Ghế trống</span>
          <strong th:text="${trip.availableSeats + '/' + trip.totalSeats}">34/34</strong>
        </div>
        <div class="trip-meta">
          <span>Giá vé</span>
          <strong th:text="${@userLabels.money(trip.price)}">250.000 đ</strong>
        </div>
        <a class="btn small" th:href="@{/user/trips/{id}(id=${trip.id})}">Chi tiết</a>
      </article>
      <p class="empty" th:if="${#lists.isEmpty(trips)}">Không có chuyến phù hợp.</p>
    </div>
  </section>
</div>
</body>
</html>
