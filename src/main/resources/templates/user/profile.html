<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{user/fragments/layout :: shell(~{::section})}">
  <section>
    <div class="profile-layout">
      <div class="profile-summary">
        <span class="avatar" th:text="${#strings.substring(profile.name, 0, 1)}">U</span>
        <h1 th:text="${profile.name}">Người dùng</h1>
        <p th:text="${profile.phone}">0900000000</p>
      </div>
      <form class="profile-form" th:action="@{/user/profile}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
          <span>Họ tên</span>
          <input type="text" name="name" th:value="${profile.name}" required>
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" th:value="${profile.email}" required>
        </label>
        <label>
          <span>Số điện thoại</span>
          <input type="tel" name="phone" th:value="${profile.phone}" required>
        </label>
        <button class="btn" type="submit">Lưu thay đổi</button>
      </form>
    </div>
  </section>
</div>
</body>
</html>
