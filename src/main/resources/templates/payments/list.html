<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: shell(~{::section})}">
  <section>
    <p class="error" th:if="${loadError}" th:text="${loadError}">Không tải được dữ liệu thanh toán</p>
    <div class="table-card">
      <table>
        <thead><tr><th>Mã</th><th>Người dùng</th><th>Vé</th><th>Số tiền</th><th>Cổng thanh toán</th><th>Trạng thái</th><th>Mã giao dịch</th></tr></thead>
        <tbody>
        <tr th:each="payment : ${payments}">
          <td th:text="${payment.documentId}">id</td>
          <td th:text="${payment.userId}">user</td>
          <td th:text="${payment.ticketId}">ticket</td>
          <td th:text="${payment.amount}">0</td>
          <td th:text="${payment.provider}">VNPAY</td>
          <td th:text="${@statusLabels.label(payment.status)}">Trạng thái</td>
          <td th:text="${payment.vnpTxnRef}">txn</td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>
