<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: shell(~{::section})}">
  <section>
    <p class="error" th:if="${loadError}" th:text="${loadError}">Không tải được dữ liệu ghế</p>
    <p th:if="${bus}" th:text="${bus.busName} + ' - ' + ${bus.licensePlate}">Xe</p>
    <form th:if="${bus}" th:action="@{/buses/{id}/seats/generate(id=${bus.documentId})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button class="btn" type="submit">Tạo ghế</button>
      <a class="btn muted" th:href="@{/buses}">Quay lại</a>
    </form>
    <div class="table-card" style="margin-top: 16px;">
      <table>
        <thead><tr><th>Ghế</th><th>Tầng</th><th>Hàng</th><th>Cột</th><th>Loại</th></tr></thead>
        <tbody>
        <tr th:each="seat : ${seats}">
          <td th:text="${seat.seatNumber}">A1</td>
          <td th:text="${seat.floor}">1</td>
          <td th:text="${seat.rowIndex}">0</td>
          <td th:text="${seat.columnIndex}">0</td>
          <td th:text="${@statusLabels.seatType(seat.seatType)}">Thường</td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>
